bind 0.0.0.0
protected-mode no
port 6379
timeout 0
tcp-keepalive 300

# Persistence
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Security
requirepass yourpassword

# Append-only file
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Logging
loglevel notice
logfile "/data/redis.log"

# Max memory
maxmemory 256mb
maxmemory-policy allkeys-lru
